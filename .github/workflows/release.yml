name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  RUST_VERSION: stable
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Strict TypeScript lint
        run: npm run lint

      - name: Strict TypeScript compile
        run: npm run typecheck

      - name: Unit, integration, and chaos tests
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Phase 3 E2E tests
        run: npm run test:e2e

      - name: Production backend bundle
        run: npm run bundle

      - name: Upload backend bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-model-switcher-mcp-backend
          path: |
            dist/production/hybrid-model-switcher-mcp.cjs
            dist/production/hybrid-model-switcher-mcp.cjs.map
            dist/production/esbuild-analysis.txt
            dist/production/esbuild-meta.json
          if-no-files-found: error

  package:
    name: Package ${{ matrix.label }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-deb
            os: ubuntu-latest
            artifact-glob: src-tauri/target/release/bundle/deb/*.deb
          - label: macos-dmg
            os: macos-latest
            artifact-glob: src-tauri/target/release/bundle/dmg/*.dmg
          - label: windows-msi
            os: windows-latest
            artifact-glob: src-tauri/target/release/bundle/msi/*.msi
    runs-on: ${{ matrix.os }}
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v3
        with:
          workspaces: src-tauri

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Verify release checks
        run: |
          npm run lint
          npm run typecheck
          npm test

      - name: Production backend bundle
        run: npm run bundle

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_BASE64 != ''
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer_id_application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/hybrid-model-switcher-signing.keychain-db"
          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Decode Windows signing certificate
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE_BASE64 != ''
        shell: pwsh
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "hybrid-model-switcher-codesign.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          "WINDOWS_CERTIFICATE_PATH=$certificatePath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Tauri native bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ env.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ env.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_PASSWORD: ${{ env.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE_PATH: ${{ env.WINDOWS_CERTIFICATE_PATH }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ env.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: src-tauri

      - name: Authenticode sign Windows MSI
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE_PATH != ''
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) {
            throw "signtool.exe was not found in the Windows SDK installation."
          }
          Get-ChildItem "src-tauri\target\release\bundle" -Recurse -Include *.msi,*.exe | ForEach-Object {
            & $signtool.FullName sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $env:WINDOWS_CERTIFICATE_PATH /p $env:WINDOWS_CERTIFICATE_PASSWORD $_.FullName
          }

      - name: Upload native bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-model-switcher-${{ matrix.label }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

  release:
    name: Draft GitHub release
    needs:
      - validate
      - package
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Draft release with signed native bundles
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Hybrid Model Switcher ${{ github.ref_name }}"
          body: "Automated native release built from ${{ github.sha }}."
          draft: true
          prerelease: false
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.msi
            release-assets/**/*.deb
            release-assets/**/hybrid-model-switcher-mcp.cjs
            release-assets/**/hybrid-model-switcher-mcp.cjs.map
            release-assets/**/esbuild-analysis.txt
            release-assets/**/esbuild-meta.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
